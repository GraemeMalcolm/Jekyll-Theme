---
layout: default
---

<body data-spy="scroll" data-target="#linksMenu">
    <nav class="navbar navbar-expand-lg navbar-dark bg-gray">
        <div class="container d-flex justify-content-between">
            <!-- <img src="https://github.com/MicrosoftLearning/Jekyll-Theme/raw/master/assets/microsoft-gray.png" alt="Microsoft logo" style="width:100px;height:21px;"/>-->
            <span class="my-1 title text-black">{% if site.title %}{{ site.title }}{% endif %}</span>
            <span class="ml-2">
                <a href="{{ site.github.url }}" class="d-flex align-items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-house-door-fill" viewBox="0 0 16 16">
                        <path
                            d="M6.5 14.5v-3.505c0-.245.25-.495.5-.495h2c.25 0 .5.25.5.5v3.5a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5" />
                    </svg>
                    &nbsp;Home
                </a>
            </span>
        </div>
        <!--
        <div class="container d-flex justify-content-between">
            <a class="my-1 title text-azure text-uppercase" href="{{ site.github.url }}">
                {{ site.title }}
            </a>
            <a href="{{ site.github.repository_url }}" target="_blank" class="btn btn-sm btn-outline-secondary text-light">
                <i class="fa fa-github" aria-hidden="true"></i>
                <span class="ml-2">GitHub</span>
            </a>
        </div>
        -->
    </nav>
    <hr color-"gray"/>
    <div class="container">
        <main class="row extra-padding">
            <aside class="col-sm-2">
                <div class="sidebar-rail sticky-top">
                    <nav id="linksMenu" class="toc">
                        <ul class="nav navbar-nav flex-column">
                        </ul>
                    </nav>
                    <section class="mini-anton" aria-label="Ask Anton">
                        <div class="mini-anton-header">
                            <div class="mini-anton-avatar" aria-hidden="true">A</div>
                            <div>
                                <h2 class="mini-anton-title">Ask Anton</h2>
                                <p class="mini-anton-subtitle">Basic mode</p>
                            </div>
                        </div>
                        <div id="mini-anton-messages" class="mini-anton-messages" role="log" aria-live="polite" aria-label="Ask Anton conversation">
                            <div class="mini-anton-message mini-anton-assistant">
                                <p>Ask an AI topic, or start with "search" / "find" for Microsoft Learn docs.</p>
                            </div>
                        </div>
                        <form id="mini-anton-form" class="mini-anton-form" aria-label="Ask Anton prompt">
                            <label for="mini-anton-input" class="sr-only">Ask Anton</label>
                            <textarea id="mini-anton-input" rows="1" placeholder="Ask Anton..." maxlength="1000"></textarea>
                            <button id="mini-anton-send" type="submit">Send</button>
                        </form>
                        <p id="mini-anton-status" class="mini-anton-status" role="status" aria-live="polite"></p>
                    </section>
                </div>
            </aside>
            <hr class="" />
            <article class="col-sm-10 mb-5">
                {{ content }}
            </article>
        </main>
    </div>
    <footer class="fixed-bottom d-print-none">
        <nav class="navbar navbar-light bg-light d-flex justify-content-around">
            <span class="navbar-text">
                &copy; 2025 Microsoft &nbsp;|&nbsp;
                  <a href="https://go.microsoft.com/fwlink/?LinkId=521839">Privacy </a>&nbsp;|&nbsp;
                  <a href="https://go.microsoft.com/fwlink/?LinkId=2259814">Consumer Health Privacy </a>&nbsp;|&nbsp;
                  <a href="https://go.microsoft.com/fwlink/?LinkID=206977">Terms of Use </a>&nbsp;|&nbsp;
                  <a href="https://www.microsoft.com/trademarks">Trademarks </a>&nbsp;|&nbsp;
                <i class="fa fa-github" aria-hidden="true"></i>
                <a href="{{ site.github.repository_url }}" target="_blank" class="ml-2">
                    Source
                </a>
            </span>
        </nav>
    </footer>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.0/clipboard.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/highlight.js/9.12.0/highlight.min.js"></script>
    <script src="{{ "/assets/js/script.js?v=" | append: site.github.build_revision | relative_url }}"></script>
</body>
